name: Deploy website to GitHub Pages

on:
  push:
    branches: [public-main, main]
    paths:
      - "Cargo.toml"
      - "npm/*/package.json"
      - "npm/scripts/verify-version-lock.mjs"
      - "umadev-website/**"
      - ".github/workflows/website-pages.yml"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: umadev-website
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: umadev-website/package-lock.json

      - name: Verify release version lock
        working-directory: ${{ github.workspace }}
        run: node npm/scripts/verify-version-lock.mjs

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=moderate

      - name: Lint
        run: npm run lint

      - name: Build static export
        env:
          GITHUB_PAGES: "true"
          GITHUB_PAGES_REPO: umadev
          GITHUB_PAGES_DOMAIN: umadev.goder.ai
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: umadev-website/out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
