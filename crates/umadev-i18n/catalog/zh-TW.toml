"checkpoint.rollback_pre_label" = "auto: 回滾到 {} 前的現場"
"checkpoint.none_to_restore" = "還沒有任何檢查點可回滾。"
"checkpoint.unknown_id" = "未知的檢查點 id「{}」—— 它不在本工作區可回滾的檢查點清單裡。檢查點 id 就是一個提交雜湊：revision 語法（`<id>^`、`<id>~1`、`HEAD~3`、分支名）是故意拒絕的——把工作區 reset 到一個並非檢查點的提交，會丟掉沒有任何地方可以找回的檔案。執行 `umadev history` 查看可用的 id。"
"checkpoint.restore_snapshot_failed" = "回滾已中止，什麼都沒動。回滾會覆蓋工作區裡的檔案，所以 UmaDev 會先給它們存一份快照——正是這份快照讓回滾本身也可撤銷。這份快照沒能存下來（本工作區的 git 不回應，或影子倉庫不可寫），因此 reset 沒有執行：丟掉一次回滾，好過丟掉成果且無路可退。請先修好本工作區的 git 存取，再重試。"
"checkpoint.git_unavailable" = "git 不可用——檢查點用影子 git 快照工作區檔案，需要本機安裝 git。"
"checkpoint.workspace_in_past_halt_unrecoverable" = "已停止，而且重啟也沒用。工作區停在更早的狀態（一次暫時取證回退沒能撤銷），而持有你「現在」的那個快照，本工作區已經無法識別——它的影子檢查點倉庫（`.umadev/checkpoints.git`）不見了或讀不了。所以自動修復拒絕動你的檔案（它永遠不會把檔案 reset 到一個無法校驗的提交），並且每次啟動都會得出同樣的拒絕。在這個停止被解除之前，不會向這棵樹寫入任何東西。解除方式：先檢查你的檔案，把看起來停在早期狀態的部分用你自己的 git 歷史恢復回來，然後執行 `umadev doctor --fix`——它會清掉引發這個停止的陳舊標記檔。單獨執行 `umadev doctor` 只報告、不改任何東西。"
"doctor.rewind_marker_name" = "工作區回退標記"
"doctor.rewind_marker_clean" = "沒有陳舊的回退標記——工作區沒有停在過去。"
"doctor.rewind_marker_recoverable" = "存在一個暫時回退標記，它指向快照「{}」，而本工作區能識別該快照。這裡不需要修：下次啟動 `umadev` 時它會自己把你的檔案放回現在。（保留這個標記正是它能做到這件事的前提——`--fix` 故意不會刪除它。）"
"doctor.rewind_marker_unrecoverable" = "陳舊的回退標記——這就是每次 `umadev run` 都立即中止的原因。該標記指向快照「{}」，而本工作區已無法識別它（影子檢查點倉庫不見了或讀不了），所以自動修復拒絕把你的檔案 reset 到它——而且每次啟動都會得出同樣的拒絕，永遠如此。執行 `umadev doctor --fix` 可以清掉它。清掉標記不會改動工作區裡的任何檔案，只是讓 UmaDev 不再反覆拋出一個它根本無法處理的停止。請先檢查你的原始碼——如果它看起來停在更早的狀態，請用你自己的 git 歷史恢復。"
"doctor.rewind_marker_cleared" = "已清除陳舊的回退標記（它指向快照「{}」，本工作區無法識別）。工作區裡的檔案一個都沒動。`umadev run` 可以重新啟動了——請先確認你的原始碼是你想要的樣子。"
