"checkpoint.temp_rewind_recovered_with_edits" = "已恢復工作區——而且你在這期間改過它。上一次執行在暫時回退取證期間被強制結束,原始碼樹一直停在更早的狀態,而這些改動是寫在那棵更舊的樹上的。現在工作區已回到快照「{}」,所以那些改動不在磁碟上了——但它們沒有遺失:恢復前工作區當時的樣子已先存為檢查點「{}」。要把那份檔案拿回來,執行:`umadev rollback {}`(`umadev history` 會列出所有檢查點)。這次恢復本身也是可撤銷的,所以你也可以比對兩者、把改動重放回來。"
"checkpoint.temp_rewind_snapshot_failed" = "你的原始碼樹仍停在更早的狀態,UmaDev 沒有動它。上一次執行在暫時回退取證期間被強制結束;要把樹放回來就必須覆蓋目前磁碟上的檔案,而 UmaDev 無法先為它們存一份快照——為了不冒險遺失你之後可能做過的工作,這次修復主動停手。當機前的成果完整保存在快照「{}」裡。標記檔「{}」已保留。請先備份你之後寫下的內容,再手動執行:「{}」(`umadev rollback <id>` 本來可以恢復檢查點裡的檔案,但此刻這個工作區的 git 不回應——正因如此,這一步只能手動做)。"
"checkpoint.temp_rewind_restore_failed" = "你的原始碼樹停在更早的狀態,UmaDev 沒能把它放回來:剛才為了取證把測試放到更早的快照上重放,之後恢復工作區失敗。執行已停止,不會再往一棵停在過去的樹上繼續寫程式碼。你的成果安全保存在快照「{}」裡;下次啟動會再嘗試恢復一次。"
"checkpoint.workspace_in_past_halt" = "已停止:工作區停在更早的狀態(一次暫時取證回退沒能撤銷)。不會再排程後續步驟——在一棵停在過去的樹上繼續寫程式碼,等於在不屬於你的檔案上添磚加瓦。重啟 UmaDev,它會先把工作區放回現在,再做別的事。"
"checkpoint.temp_rewind_recovery_failed" = "工作區仍停在更早的狀態:上一次執行在暫時回退取證期間被強制結束,UmaDev 無法自動把原始碼樹放回來。你的成果完整保存在快照「{}」裡。標記檔「{}」已保留,下次啟動會再試一次。要手動恢復,請執行:「{}」(`umadev rollback <id>` 本來可以恢復檢查點裡的檔案,但這個工作區剛剛 reset 失敗——正因如此,這一步只能手動做)。"
"checkpoint.temp_rewind_unrecoverable" = "請檢查你的原始碼樹:上一次執行在暫時回退取證期間被強制結束,而它記錄的快照「{}」在本工作區裡無法識別,所以 UmaDev 不會把你的檔案重置到這個未知的提交上——什麼都沒動,而且在這棵樹回到現在之前,不會再往上面寫任何東西。標記檔「{}」已保留;如果你的程式碼看起來停在更早的狀態,請用你自己的 git 歷史恢復(`umadev rollback` 對這個 id 無能為力——它不是本工作區能識別的檢查點;`umadev history` 會列出能識別的那些)。等檔案恢復成你想要的樣子後,執行 `umadev doctor --fix` 即可解除這個停止狀態——它會清掉上面那個陳舊標記,不會改動工作區裡的任何檔案。(單獨執行 `umadev doctor` 只報告、不改任何東西。)"
