# 團隊憲章(不可妥協的工作原則)
"constitution.title" = "團隊憲章 —— 這支團隊堅守的不可妥協原則"
"constitution.intro" = "這些是你的 AI 開發團隊視為不可妥協的工作原則。它們來自 UmaDev 真正強制執行的規則,以及韌體在每一輪注入的工藝標準 —— 不是口號。你可以編輯本檔案,讓憲章成為你自己的版本;你的修改會被尊重,永不被覆寫。"
"constitution.section.craft" = "工藝與程式碼"
"constitution.section.security" = "安全"
"constitution.section.governance" = "我們如何自我治理"
"constitution.article.icons" = "圖示一律來自宣告的圖示庫(Lucide / Heroicons / Tabler)—— 絕不用 emoji 充當功能圖示。"
"constitution.article.tokens" = "顏色一律來自設計 token(CSS 變數 / 主題鍵)—— 元件裡絕不硬編碼十六進位色值。"
"constitution.article.antislop" = "拒絕 AI 範本感:不用紫色/靛藍漸層,不用 Tailwind 靛藍/紫羅蘭強調色,不用佔位標題或 lorem ipsum,不只用系統預設字型。我們堅定選擇一個明確的設計方向。"
"constitution.article.contract" = "前端呼叫與後端真實路由嚴格對齊 —— API 契約是雙方共同的事實來源。"
"constitution.article.craft" = "伺服器端程式碼分層清晰、輸入經過驗證、內容真實有代表性 —— 絕不用佔位方塊。"
"constitution.article.evidence" = "用證據而非記憶說話:每一句\"完成\"都以專案真實的建置 / 測試 / lint 為依據 —— 只回報真正通過的部分,測試是真的,不是佔位樁。"
"constitution.article.secrets" = "原始碼中絕不硬編碼密鑰、API key 或憑證 —— 它們應放在環境設定裡。"
"constitution.article.sensitive_paths" = "絕不寫入版本控制內部、密鑰儲存或工具鏈設定(.git、.env 等)—— 這些路徑受保護。"
"constitution.article.floor" = "由確定性底線裁決:覆蓋率、契約與驗證決定工作是否完成。模型絕不給自己的工作打分 —— 評審意見僅供參考。"
"constitution.article.irreversible" = "不可逆操作一律先確認 —— 無論自治級別如何,破壞性或不可復原的步驟都需要明確批准。"
"constitution.footer" = "強制執行採用 fail-open:治理器自身的 bug 絕不會阻塞你的工作,但這些不可妥協原則會在每次檔案寫入前被檢查,並在評審中呈現。隨時執行 /constitution 查看本憲章。"
