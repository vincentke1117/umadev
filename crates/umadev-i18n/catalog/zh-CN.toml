"checkpoint.workspace_in_past_halt" = "已停止:工作区停在更早的状态(一次临时取证回退没能撤销)。不会再调度后续步骤——在一棵停在过去的树上继续写代码,等于在不属于你的文件上添砖加瓦。重启 UmaDev,它会先把工作区放回现在,再做别的事。"
"checkpoint.temp_rewind_recovery_failed" = "工作区仍停在更早的状态:上一次运行在临时回退取证期间被强制结束,UmaDev 无法自动把源码树放回来。你的成果完整保存在快照「{}」里。标记文件「{}」已保留,下次启动会再试一次。要手动恢复,请执行:「{}」(`umadev rollback <id>` 本来可以恢复检查点里的文件,但这个工作区刚刚 reset 失败——正因如此,这一步只能手动做)。"
"checkpoint.temp_rewind_unrecoverable" = "请检查你的源码树:上一次运行在临时回退取证期间被强制结束,而它记录的快照「{}」在本工作区里无法识别,所以 UmaDev 不会把你的文件重置到这个未知的提交上——什么都没动,并且在这棵树回到现在之前,不会再往上面写任何东西。标记文件「{}」已保留;如果你的代码看起来停在更早的状态,请用你自己的 git 历史恢复(`umadev rollback` 对这个 id 无能为力——它不是本工作区能识别的检查点;`umadev history` 会列出能识别的那些)。等文件恢复成你想要的样子后,执行 `umadev doctor --fix` 即可解除这个停止状态——它会清掉上面那个陈旧标记,不会改动工作区里的任何文件。(单独执行 `umadev doctor` 只报告、不改任何东西。)"
"checkpoint.heal_rescue_label" = "工作区自动修复前的现场(含你在回退期间写下的改动)"
"checkpoint.rollback_pre_label" = "auto: 回滚到 {} 前的现场"
"checkpoint.none_to_restore" = "还没有任何检查点可回滚。"
"checkpoint.unknown_id" = "未知的检查点 id「{}」—— 它不在本工作区可回滚的检查点列表里。检查点 id 就是一个提交哈希：revision 语法（`<id>^`、`<id>~1`、`HEAD~3`、分支名）是故意拒绝的——把工作区 reset 到一个并非检查点的提交，会丢掉没有任何地方可以找回的文件。执行 `umadev history` 查看可用的 id。"
"checkpoint.restore_snapshot_failed" = "回滚已中止，什么都没动。回滚会覆盖工作区里的文件，所以 UmaDev 会先给它们存一份快照——正是这份快照让回滚本身也可撤销。这份快照没能存下来（本工作区的 git 不响应，或影子仓库不可写），因此 reset 没有执行：丢掉一次回滚，好过丢掉成果且无路可退。请先修好本工作区的 git 访问，再重试。"
"checkpoint.git_unavailable" = "git 不可用——检查点用影子 git 快照工作区文件，需要本机安装 git。"
"checkpoint.workspace_in_past_halt_unrecoverable" = "已停止，而且重启也没用。工作区停在更早的状态（一次临时取证回退没能撤销），而持有你“现在”的那个快照，本工作区已经无法识别——它的影子检查点仓库（`.umadev/checkpoints.git`）不见了或读不了。所以自动修复拒绝动你的文件（它永远不会把文件 reset 到一个无法校验的提交），并且每次启动都会得出同样的拒绝。在这个停止被解除之前，不会向这棵树写入任何东西。解除方式：先检查你的文件，把看起来停在早期状态的部分用你自己的 git 历史恢复回来，然后执行 `umadev doctor --fix`——它会清掉引发这个停止的陈旧标记文件。单独执行 `umadev doctor` 只报告、不改任何东西。"
"doctor.rewind_marker_name" = "工作区回退标记"
"doctor.rewind_marker_clean" = "没有陈旧的回退标记——工作区没有停在过去。"
"doctor.rewind_marker_recoverable" = "存在一个临时回退标记，它指向快照「{}」，而本工作区能识别该快照。这里不需要修：下次启动 `umadev` 时它会自己把你的文件放回现在。（保留这个标记正是它能做到这件事的前提——`--fix` 故意不会删除它。）"
"doctor.rewind_marker_unrecoverable" = "陈旧的回退标记——这就是每次 `umadev run` 都立即中止的原因。该标记指向快照「{}」，而本工作区已无法识别它（影子检查点仓库不见了或读不了），所以自动修复拒绝把你的文件 reset 到它——而且每次启动都会得出同样的拒绝，永远如此。执行 `umadev doctor --fix` 可以清掉它。清掉标记不会改动工作区里的任何文件，只是让 UmaDev 不再反复抛出一个它根本无法处理的停止。请先检查你的源码——如果它看起来停在更早的状态，请用你自己的 git 历史恢复。"
"doctor.rewind_marker_cleared" = "已清除陈旧的回退标记（它指向快照「{}」，本工作区无法识别）。工作区里的文件一个都没动。`umadev run` 可以重新启动了——请先确认你的源码是你想要的样子。"
