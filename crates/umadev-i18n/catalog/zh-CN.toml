# 底座 AskUserQuestion 桥接 —— 底座向你发起了结构化的多选提问,但 UmaDev 以非交互
# 方式驱动底座,于是把问题和选项在此完整呈现(而不是只显示一个空壳),你的回复会在
# 同一会话的下一轮转交给底座。
"ask.prompt.header" = "[提问] 底座请你做出选择:"
"ask.prompt.relay_hint" = "回复选项编号(或直接输入文字),我会在同一对话里把你的选择转交给底座 —— 它无法弹出自己的选择框,所以是在等你的回答,并未被取消。"
# 文字问答模式(question_form = text):把底座的提问以自然语言方式呈现,你用自己的话回答,无需选编号。
"ask.prompt.text_hint" = "用你自己的话回答即可 —— 直接告诉我你的决定,我会在同一对话里转交给底座(无需选编号)。"
"ask.prompt.midrun_hint" = "构建不会停在这里:底座会先按默认选项继续。你现在输入的回答会在下一个步骤边界并入指令,作为后续调整生效。"

# 底座自身的计划模式(claude-code 的 ExitPlanMode)—— 底座起草了计划,正请求退出它自己的
# 计划模式并开始执行。这是底座的计划模式,与 UmaDev 的守护模式不同,必须清楚标注区分。
"plan_mode.base_exit" = "[计划] 底座(claude-code)的计划模式:它起草了以下计划,正请求退出计划模式并开始执行。(这是底座自己的计划模式,不是 UmaDev 的守护模式 —— 确认即可让它继续。)"

# 文字问答模式:当 UmaDev 门禁以自然语言而非编号选择框呈现时追加的提示(自由文字回复即可驱动决策)。
"question.text_hint" = "用你自己的话回答即可 —— 直接告诉我如何继续(确认、要求修改、或补充内容),无需选编号。"

