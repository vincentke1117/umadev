# 团队宪章(不可妥协的工作原则)
"constitution.title" = "团队宪章 —— 这支团队坚守的不可妥协原则"
"constitution.intro" = "这些是你的 AI 开发团队视为不可妥协的工作原则。它们来自 UmaDev 真正强制执行的规则,以及固件在每一轮注入的工艺标准 —— 不是口号。你可以编辑本文件,让宪章成为你自己的版本;你的修改会被尊重,永不被覆盖。"
"constitution.section.craft" = "工艺与代码"
"constitution.section.security" = "安全"
"constitution.section.governance" = "我们如何自我治理"
"constitution.article.icons" = "图标一律来自声明的图标库(Lucide / Heroicons / Tabler)—— 绝不用 emoji 充当功能图标。"
"constitution.article.tokens" = "颜色一律来自设计 token(CSS 变量 / 主题键)—— 组件里绝不硬编码十六进制色值。"
"constitution.article.antislop" = "拒绝 AI 模板感:不用紫色/靛蓝渐变,不用 Tailwind 靛蓝/紫罗兰强调色,不用占位标题或 lorem ipsum,不只用系统默认字体。我们坚定选择一个明确的设计方向。"
"constitution.article.contract" = "前端调用与后端真实路由严格对齐 —— API 契约是双方共同的事实来源。"
"constitution.article.craft" = "服务端代码分层清晰、输入经过校验、内容真实有代表性 —— 绝不用占位方块。"
"constitution.article.evidence" = "用证据而非记忆说话:每一句\"完成\"都以项目真实的构建 / 测试 / lint 为依据 —— 只汇报真正通过的部分,测试是真的,不是占位桩。"
"constitution.article.secrets" = "源码中绝不硬编码密钥、API key 或凭据 —— 它们应放在环境配置里。"
"constitution.article.sensitive_paths" = "绝不写入版本控制内部、密钥存储或工具链配置(.git、.env 等)—— 这些路径受保护。"
"constitution.article.floor" = "由确定性底线裁决:覆盖率、契约与验证决定工作是否完成。模型绝不给自己的工作打分 —— 评审意见仅供参考。"
"constitution.article.irreversible" = "不可逆操作一律先确认 —— 无论自治级别如何,破坏性或不可恢复的步骤都需要明确批准。"
"constitution.footer" = "强制执行采用 fail-open:治理器自身的 bug 绝不会阻塞你的工作,但这些不可妥协原则会在每次文件写入前被检查,并在评审中呈现。随时运行 /constitution 查看本宪章。"
"constitution.overlay_title" = "团队宪章"
"constitution.edit_hint" = "你可以在 {} 阅读并编辑本宪章 —— 你的修改会成为团队宪章,永不被覆盖。"
