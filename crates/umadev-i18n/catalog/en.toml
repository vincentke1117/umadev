# Base AskUserQuestion bridge — the base asked the user a structured
# multiple-choice question, but UmaDev drives it non-interactively, so the
# question + options are surfaced here (instead of a bare stub) and the user's
# reply is relayed back to the base on the next turn of the same session.
"ask.prompt.header" = "[question] The base is asking you to choose:"
"ask.prompt.relay_hint" = "Reply with the option number (or text) and I'll pass your choice to the base in this same conversation — it could not pop up its own picker, so it's waiting on your answer, not cancelled."
# Text-question mode (`question_form = text`): the base asked a question, framed as
# prose the user answers in their own words rather than by picking a number.
"ask.prompt.text_hint" = "Answer in your own words — just tell me what you want and I'll pass it to the base in this same conversation (no need to pick a number)."
"ask.prompt.midrun_hint" = "The originating base request is paused here. Type the requested answer and press Enter to reply to that same request; Esc cancels it safely."

# The base CLI's OWN plan mode (claude-code's ExitPlanMode) — the base drafted a
# plan and is asking to leave ITS plan mode and start executing. This is the BASE's
# plan mode, distinct from UmaDev's own guarded tier, so it must be labeled clearly.
"plan_mode.base_exit" = "[plan] The base CLI's plan mode: it drafted this plan and is asking to exit plan mode and start executing. (This is the base's own plan mode, not UmaDev's guarded tier — confirm to let it proceed.)"

# Text-question mode: the hint appended when a UmaDev gate is framed as prose
# instead of a numbered picker (the free-text reply already drives the decision).
"question.text_hint" = "Answer in your own words — just tell me how to proceed (approve, request changes, or add more); no need to pick a number."

