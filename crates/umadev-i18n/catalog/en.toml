"checkpoint.temp_rewind_recovered" = "Workspace restored: the previous run was killed while the source tree was temporarily rewound for evidence, leaving your files at an earlier state. They are back at the snapshot 「{}」 — your code is no longer stuck in the past. Nothing was discarded: the tree as it stood a moment ago was saved first as the checkpoint 「{}」. To bring those files back, run: `umadev rollback {}` (`umadev history` lists every checkpoint)."
"checkpoint.temp_rewind_recovered_with_edits" = "Workspace restored — AND YOU HAD BEEN EDITING IT. A previous run was killed while the source tree was temporarily rewound for evidence, so your files sat at an earlier state, and changes were made on top of that older tree. The tree is now back at the snapshot 「{}」, so those changes are NO LONGER on disk — they were NOT lost: everything as it stood a moment ago was saved first as the checkpoint 「{}」. To bring those files back, run: `umadev rollback {}` (`umadev history` lists every checkpoint). That restore is itself undoable, so you can also diff the two and replay your edits."
"checkpoint.temp_rewind_snapshot_failed" = "Your source tree is still at an earlier state, and UmaDev did NOT touch it. A previous run was killed while the tree was temporarily rewound for evidence; putting it back means overwriting the files that are there right now, and UmaDev could not first save a snapshot of them — so it stood down rather than risk discarding work you may have done since. Your pre-crash work is safe in the snapshot 「{}」. The marker 「{}」 is kept. Back up anything you have written since, then restore by hand with: 「{}」 (`umadev rollback <id>` restores a checkpoint's files, but git is not answering in this workspace right now — which is exactly why this one has to be done by hand)."
"checkpoint.temp_rewind_restore_failed" = "Your source tree is at an EARLIER state and UmaDev could not put it back: a test was replayed against an earlier snapshot and the workspace could not be restored afterwards. The run has been stopped so nothing else is written on top of a tree that is in the past. Your work is safe in the snapshot 「{}」; the next start will try the restore again."
"checkpoint.workspace_in_past_halt" = "Stopped: the workspace is at an earlier state (a temporary evidence rewind could not be undone). No further steps will be driven — writing more code onto a tree that is in the past would build on files that are not yours. Restart UmaDev and it will put the tree back at the present before doing anything else."
"checkpoint.temp_rewind_recovery_failed" = "Workspace still at an earlier state: a previous run was killed while the source tree was temporarily rewound for evidence, and UmaDev could not put it back automatically. Your work is safe in the snapshot 「{}」. The marker 「{}」 is kept, so the next start retries. To restore it by hand, run: 「{}」 (`umadev rollback <id>` restores a checkpoint's files, but the reset just failed in this workspace — which is why this one has to be done by hand)."
"checkpoint.temp_rewind_unrecoverable" = "Check your source tree: a previous run was killed while it was temporarily rewound for evidence, and the snapshot it recorded 「{}」 is not one this workspace can identify — so UmaDev will NOT reset your files to it. Nothing was touched, and no further work will be driven onto this tree until it is back at the present. The marker 「{}」 is kept; if your files look like an earlier state, recover them from your own git history (`umadev rollback` cannot help with this id — it is not one this workspace can identify; `umadev history` lists the ones it can). Once your files are the way you want them, run `umadev doctor --fix` to clear this stop — it removes the stale marker above and changes no file in your work-tree. (`umadev doctor` alone reports it without changing anything.)"
"checkpoint.heal_rescue_label" = "workspace as it stood before the automatic repair (includes anything you wrote while it was rewound)"
"checkpoint.rollback_pre_label" = "auto: workspace as it stood before rolling back to {}"
"checkpoint.none_to_restore" = "There are no checkpoints to roll back to yet."
"checkpoint.unknown_id" = "Unknown checkpoint id 「{}」 — it is not one of the checkpoints this workspace can roll back to. A checkpoint id is a plain commit hash: revision syntax (`<id>^`, `<id>~1`, `HEAD~3`, a branch name) is refused on purpose, because resetting the work-tree to a commit that is not a checkpoint would discard files with nothing to restore them from. Run `umadev history` to see the ids you can use."
"checkpoint.restore_snapshot_failed" = "Rollback ABORTED, and nothing was touched. A rollback overwrites the files in your work-tree, so UmaDev snapshots them first — that snapshot is what makes the rollback itself undoable. It could not be taken (git is not answering in this workspace, or the shadow repo is not writable), so the reset was NOT run: losing a rollback is better than losing work with no way back. Fix git access for this workspace and try again."
"checkpoint.git_unavailable" = "git is unavailable — checkpoints snapshot workspace files with a shadow git, which requires git installed locally."
"checkpoint.workspace_in_past_halt_unrecoverable" = "Stopped, and a RESTART WILL NOT FIX IT. Your workspace is at an earlier state (a temporary evidence rewind could not be undone), and the snapshot that holds your present is one this workspace can no longer identify — its shadow checkpoint repo (`.umadev/checkpoints.git`) is gone or unreadable. So the automatic repair refuses to touch your files (it will never reset them to a commit it cannot verify) and it will refuse again on every start. Nothing will be written onto this tree until the stop is lifted. To lift it: check your files, recover anything that looks like an earlier state from your own git history, then run `umadev doctor --fix` — it clears the stale marker that is raising this stop. `umadev doctor` alone reports it without changing anything."
"doctor.rewind_marker_name" = "workspace rewind marker"
"doctor.rewind_marker_clean" = "No stale rewind marker — the workspace is not stuck in the past."
"doctor.rewind_marker_recoverable" = "A temporary rewind marker is present and names the snapshot 「{}」, which this workspace CAN identify. Nothing to fix here: the next `umadev` start will put your files back at the present by itself. (Leaving the marker in place is what lets it do that — `--fix` deliberately does not remove this one.)"
"doctor.rewind_marker_unrecoverable" = "STALE REWIND MARKER — this is what makes every `umadev run` abort immediately. The marker names the snapshot 「{}」, which this workspace can no longer identify (its shadow checkpoint repo is gone or unreadable), so the automatic repair refuses to reset your files to it — and reaches the same refusal on every start, forever. Re-run with `umadev doctor --fix` to clear it. Clearing the marker changes NO file in your work-tree; it only stops UmaDev from re-raising a halt it can never act on. Check your source first — if it looks like an earlier state, recover it from your own git history."
"doctor.rewind_marker_cleared" = "Cleared the stale rewind marker (it named the snapshot 「{}」, which this workspace cannot identify). No file in your work-tree was changed. `umadev run` will start again — check that your source is the way you want it first."
