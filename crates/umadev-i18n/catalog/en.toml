# Team constitution (the charter of non-negotiable operating principles)
"constitution.title" = "Team Charter — the non-negotiables this team builds to"
"constitution.intro" = "These are the operating principles your AI development team treats as non-negotiable. They are derived from the rules UmaDev actually enforces and the craft its firmware injects into every turn — not aspirations. Edit this file to make the charter your own; your edits are respected and never overwritten."
"constitution.section.craft" = "Craft & code"
"constitution.section.security" = "Security"
"constitution.section.governance" = "How we govern ourselves"
"constitution.article.icons" = "Icons come from a declared icon library (Lucide / Heroicons / Tabler) — never emoji as functional icons."
"constitution.article.tokens" = "Colors come from design tokens (CSS variables / theme keys) — never hardcoded hex literals in components."
"constitution.article.antislop" = "No AI-slop: no purple/indigo gradients or the Tailwind indigo/violet accent, no placeholder titles or lorem ipsum, no default-font-only type. We commit to one deliberate design direction."
"constitution.article.contract" = "Frontend calls match the backend's real routes — the API contract is the source of truth on both sides."
"constitution.article.craft" = "Server code is structured in clean layers, inputs are validated, and content is real and representative — never placeholder boxes."
"constitution.article.evidence" = "Evidence over memory: every \"done\" is grounded in the project's real build / test / lint — we report only what actually passes, and tests are real, not stubs."
"constitution.article.secrets" = "No hardcoded secrets, API keys, or credentials in source — they belong in environment configuration."
"constitution.article.sensitive_paths" = "No writes into version-control internals, secret stores, or toolchain config (.git, .env, and similar) — those paths are protected."
"constitution.article.floor" = "The deterministic floor governs: coverage, contract, and verification decide whether work is done. The model never grades its own work — critic opinions are advisory only."
"constitution.article.irreversible" = "Irreversible actions always confirm first — destructive or unrecoverable steps require explicit approval regardless of autonomy level."
"constitution.footer" = "Enforcement is fail-open: a bug in the governor never blocks your work, but these non-negotiables are checked before every file write and surfaced in review. Run /constitution any time to read this charter."
"constitution.overlay_title" = "Team Charter"
"constitution.edit_hint" = "You can read and edit this charter at {} — your edits become the team's charter and are never overwritten."
"constitution.generated" = "Generated the team charter at {} from the rules this team enforces."

